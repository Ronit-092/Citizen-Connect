<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CitizenConnect - Bridge the gap between citizens and government. Report civic issues, track progress in real-time, and hold authorities accountable with complete transparency." />
    <meta name="keywords" content="civic issues, government, complaints, transparency, public services" />
    <meta name="author" content="CitizenConnect" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citizenconnect.gov" />
    <meta property="og:title" content="CitizenConnect - Your Voice, Their Action" />
    <meta property="og:description" content="Bridge the gap between citizens and government. Report civic issues, track progress in real-time, and hold authorities accountable with complete transparency." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://citizenconnect.gov" />
    <meta property="twitter:title" content="CitizenConnect - Your Voice, Their Action" />
    <meta property="twitter:description" content="Bridge the gap between citizens and government. Report civic issues, track progress in real-time, and hold authorities accountable with complete transparency." />
    <meta property="twitter:image" content="/og-image.jpg" />
    
    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Leaflet CSS (preload for map components) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
    
    <title>CitizenConnect - Your Voice, Their Action</title>
    
    <!-- Performance optimizations -->
    <script>
      // Preload critical resources
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          // Preload important pages
          const importantRoutes = ['/citizen-login', '/citizen-signup', '/govt-login'];
          importantRoutes.forEach(route => {
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = route;
            document.head.appendChild(link);
          });
        });
      }
    </script>
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#7c3aed" />
    
    <!-- Progressive Web App manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
    <!-- Critical CSS inlined for faster loading -->
    <style>
      /* Critical above-the-fold styles */
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1a0a42 0%, #3a1a7e 50%, #2a1a60 100%);
        color: white;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Loading spinner styles */
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a0a42 0%, #3a1a7e 50%, #2a1a60 100%);
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(124, 58, 237, 0.3);
        border-top: 4px solid #7c3aed;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 16px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }
      
      /* Hide loading once app loads */
      #root:not(:empty) + .loading-container {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- App container -->
    <div id="root"></div>
    
    <!-- Loading fallback -->
    <div class="loading-container">
      <div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading CitizenConnect...</div>
      </div>
    </div>
    
    <!-- Module script -->
    <script type="module" src="/client/main.tsx"></script>
    
    <!-- Fallback for browsers that don't support modules -->
    <script nomodule>
      document.body.innerHTML = '<div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;"><h1>Browser Not Supported</h1><p>Please use a modern browser that supports JavaScript modules.</p></div>';
    </script>
  </body>
</html>
